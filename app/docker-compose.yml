services:
  db:
    container_name: db
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_DATABASE: 'db'
      MYSQL_USER: 'user'
      MYSQL_PASSWORD: 'password'
      MYSQL_ROOT_PASSWORD: 'password'
    ports:
      - '3306:3306'
    expose:
      - '3306'

  back: 
    container_name: back
    build:
      context: ./back
      dockerfile: Dockerfile
    tty: true
    command: /bin/bash -c "service nginx start && php-fpm"
    environment:
      - ELASTICSEARCH_HOST=elasticsearch-es-http
      - ELASTICSEARCH_PORT=9200 
      - ELASTICSEARCH_SCHEME=http
      - ELASTICSEARCH_USER=elastic
      - ELASTICSEARCH_PASS=password
    ports:
      - 8080:80
    depends_on:
      - db

  front:
    container_name: front
    build:
      context: ./front
      dockerfile: Dockerfile
    tty: true
    ports:
      - 8000:80
    restart: always

  amqp:
    container_name: rabbitmq
    image: rabbitmq:management
    environment:
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=password
    ports:
      - 5672:5672
      - 15672:15672